              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/studies/{id}:
    get:
      summary: Get a study with its chapters
      operationId: getStudy
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          required: true
          description: Lichess study ID
          schema:
            type: string
      responses:
        "200":
          description: Study detail with chapter list (no PGN bodies)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  data:
                    $ref: "#/components/schemas/LichessStudyDetail"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Study not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/studies/{id}/chapters/{chapterId}/pgn:
    get:
      summary: Get a chapter's PGN
      description: Returns the cached PGN of a single study chapter as text.
      operationId: getStudyChapterPgn
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          required: true
          description: Lichess study ID
          schema:
            type: string
        - name: chapterId
          in: path
          required: true
          description: Chapter ID
          schema:
            type: string
      responses:
        "200":
          description: Chapter PGN
          content:
            application/x-chess-pgn:
              schema:
                type: string
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Chapter not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/miniatures:
    get:
      summary: List miniatures
      description: |
        Decisive short games (more than two full moves, ended by move 19) derived
        from the master database. Default sort is by average rating (strongest
        first). Premium gating is not enforced in v1.
      operationId: listMiniatures
      tags:
        - Miniatures
      parameters:
        - name: window
          in: query
          required: false
          description: Time window over the game date
          schema:
            type: string
            enum: [today, week, all]
            default: all
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [rating, moves, recent]
            default: rating
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: result
          in: query
          required: false
          description: Filter by result(s) W (white win) / B (black win). Comma-separated or repeated.
          schema:
            type: string
        - name: eco
          in: query
          required: false
          description: Filter by exact ECO code(s), comma-separated or repeated (e.g. B12,C44)
          schema:
            type: string
        - name: ecoCategory
          in: query
          required: false
          description: Filter by ECO category letter(s) A-E, comma-separated or repeated
          schema:
            type: string
        - name: timeControl
          in: query
          required: false
          description: Filter by time control(s) CLASSICAL/RAPID/BLITZ, comma-separated or repeated
          schema:
            type: string
        - name: isOnline
          in: query
          required: false
          schema:
            type: boolean
        - name: minRating
          in: query
          required: false
          description: Minimum average rating of the two players
          schema:
            type: integer
        - name: maxRating
          in: query
          required: false
          description: Maximum average rating of the two players
          schema:
            type: integer
        - name: minMoves
          in: query
          required: false
          description: Minimum final move number
          schema:
            type: integer
        - name: maxMoves
          in: query
          required: false
          description: Maximum final move number
          schema:
            type: integer
        - name: dateFrom
          in: query
          required: false
          description: Inclusive lower bound on game date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          description: Inclusive upper bound on game date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: player
          in: query
          required: false
          description: Case-insensitive substring match on either player's name
          schema:
            type: string
        - name: playerId
          in: query
          required: false
          description: Exact player UUID match on either side
          schema:
            type: string
      responses:
        "200":
          description: List of miniatures
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Miniature"
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /portal/dev-keys:
    post:
      summary: Mint a contributor developer key
      description: |
        Creates a new `cevg_*` developer key for a portal-verified user and
        returns the raw key **exactly once** — only a SHA-256 hash is stored.

        **Server-to-server only.** Mounted outside `/api` (no `X-API-Key`);
        authenticated with the shared portal secret. Called exclusively by the
        chessever.com developer portal after it has verified the user's
        Supabase session. Contributors use the portal UI, never this endpoint.
      operationId: mintDeveloperKey
      tags:
        - Developer Keys (portal)
      security:
        - PortalSecretAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  description: Supabase auth user id of the key owner
                label:
                  type: string
                  maxLength: 60
                  description: Optional display label (e.g. "my laptop")
      responses:
        "201":
          description: Key created. The `key` field is shown only in this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperKeyCreated"
        "400":
          description: Missing userId
        "401":
          description: Missing or invalid portal secret
        "409":
          description: Active-key quota reached (revoke one first)
    get:
      summary: List a user's active developer keys
      description: |
        Returns metadata for the user's active (non-revoked, non-expired) keys.
        Never returns raw keys or hashes. Server-to-server only (portal secret).
      operationId: listDeveloperKeys
      tags:
        - Developer Keys (portal)
      security:
        - PortalSecretAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeveloperKey"
                  max_active:
                    type: integer
        "400":
          description: Missing userId
        "401":
          description: Missing or invalid portal secret

  /portal/dev-keys/{id}:
    delete:
      summary: Revoke a developer key
      description: |
        Revokes one of the user's keys. Scoped to the owner — a mismatched
        `userId` is a no-op. A revoked key may keep working for up to 60
        seconds (validation cache TTL). Server-to-server only (portal secret).
      operationId: revokeDeveloperKey
      tags:
        - Developer Keys (portal)
      security:
        - PortalSecretAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked (or no-op if not owned by userId)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Missing id or userId
        "401":
          description: Missing or invalid portal secret

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for authentication. Two tiers share this header:
        first-party (official apps, unlimited) and contributor developer keys
        (`cevg_*`, read-only + rate-limited; generate at
        https://chessever.com/developers). Contributor keys receive 403 on
        `/api/admin`, `/api/ingest`, `/api/eval` and 429 (with `Retry-After`)
        when over 30 req/min, 5,000 req/day, or the shared global ceiling.
    PortalSecretAuth:
      type: apiKey
      in: header
      name: X-Portal-Secret
      description: |
        Shared secret for the `/portal/dev-keys` endpoints. Server-to-server
        use by the chessever.com developer portal only.

  schemas:
    DeveloperKey:
      type: object
      description: Metadata for an active contributor developer key (never the raw key).
      properties:
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
          description: First 13 characters of the key, for display (e.g. "cevg_EqNA9byo")
        label:
          type: ["string", "null"]
        tier:
          type: string
          example: contributor
        scopes:
          type: array
          items:
            type: string
          example: ["read:safe"]
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: ["string", "null"]
          format: date-time
        expires_at:
          type: string
          format: date-time

    DeveloperKeyCreated:
      type: object
      description: Returned once at creation; the raw key is never retrievable again.
      properties:
        key:
          type: string
          description: The raw developer key (`cevg_*`). Shown exactly once.
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
        expires_at:
          type: string
          format: date-time
        max_active:
          type: integer

    LichessStudyListItem:
      type: object
      properties:
        id:
          type: string
        authorUsername:
          type: string
          nullable: true
        name:
          type: string
        views:
          type: integer
          description: View count scraped from Lichess's trending list (popularity signal)
        lichessCreatedAt:
          type: string
          format: date-time
          nullable: true
        lichessUpdatedAt:
          type: string
          format: date-time
        chapterCount:
          type: integer
        plyTotal:
          type: integer
        hasAnnotations:
          type: boolean
        ecos:
          type: array
          description: Distinct ECO codes across the study's chapters
          items:
            type: string
        ecoCategories:
          type: array
          description: Distinct ECO category letters (A-E)
          items:
            type: string
        openings:
          type: array
          description: Distinct opening names across chapters
          items:
            type: string
        variants:
          type: array
          description: Distinct variants (e.g. Standard, Chess960)
          items:
            type: string
        chapterModes:
          type: array
          description: Distinct chapter modes (gamebook, normal, practice, conceal)
          items:
            type: string
        players:
          type: array
          description: Distinct featured player names (for game-based chapters)
          items:
            type: string
        isGamebook:
          type: boolean
          description: True if any chapter is an interactive (gamebook) lesson
        hasCustomPositions:
          type: boolean
          description: True if any chapter starts from a custom position (SetUp)
        credibilityScore:
          type: number
          description: 0-100 quality score; studies below the tunable threshold are not served
        passedGate:
          type: boolean
        status:
          type: string
          enum: [active, gone]
        syncedAt:
          type: string
          format: date-time
    StudyFacets:
      type: object
      description: Distinct filter values across served studies
      properties:
        ecoCategories:
          type: array
          items:
            type: string
        openings:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            type: string
        chapterModes:
          type: array
          items:
            type: string
        players:
          type: array
          items:
            type: string
    LichessStudyChapterMeta:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chapterId:
          type: string
        name:
          type: string
          nullable: true
        plyCount:
          type: integer
        orderIndex:
          type: integer
        eco:
          type: string
          nullable: true
        opening:
          type: string
          nullable: true
        variant:
          type: string
          nullable: true
        result:
          type: string
          nullable: true
        chapterMode:
          type: string
          nullable: true
        isSetup:
          type: boolean
        whiteName:
          type: string
          nullable: true
        blackName:
          type: string
          nullable: true
        whiteElo:
          type: integer
          nullable: true
        blackElo:
          type: integer
          nullable: true
        hasAnnotations:
          type: boolean
    LichessStudyDetail:
      type: object
      properties:
        study:
          $ref: "#/components/schemas/LichessStudyListItem"
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/LichessStudyChapterMeta"
    Miniature:
      type: object
      properties:
        gameId:
          type: string
          format: uuid
        avgRating:
          type: integer
          nullable: true
        plyCount:
          type: integer
        finalMoveNumber:
          type: integer
        result:
          type: string
          enum: [W, B]
        timeControl:
          type: string
          enum: [CLASSICAL, RAPID, BLITZ]
        isOnline:
          type: boolean
        date:
          type: string
          format: date-time
        event:
          type: string
          nullable: true
        eco:
          type: string
          nullable: true
        ecoCategory:
          type: string
          nullable: true
          description: ECO category letter (A-E)
        opening:
          type: string
          nullable: true
        variation:
          type: string
          nullable: true
        whiteName:
          type: string
          nullable: true
        blackName:
          type: string
          nullable: true
        whiteElo:
          type: integer
          nullable: true
        blackElo:
          type: integer
          nullable: true
        whitePlayerId:
          type: string
          nullable: true
        blackPlayerId:
          type: string
          nullable: true
        whiteFed:
          type: string
          nullable: true
        blackFed:
          type: string
          nullable: true
    PositionAggregatesQueryRequest:
      type: object
      required:
        - fen
      properties:
        fen:
          type: string
          description: |
            FEN string representing the chess position.
            The halfmove clock and fullmove number (last two FEN fields) are ignored for matching.
        moves:
          type: array
          description: |
            Explored mainline moves (UCI), from the start position to the current position.
            Required for deep exploration beyond the indexed opening window.
          items:
            type: string
            pattern: "^[a-h][1-8][a-h][1-8][qrbn]?$"
          example: ["e2e4", "e7e5", "g1f3", "b8c6"]
        playerId:
          type: string
          format: uuid
          description: Filter by player UUID (player to move at this position)
        timeControl:
          type: string
          enum: [CLASSICAL, RAPID, BLITZ]
          description: |
            Filter games by their classified time control category.
            Classification is based on the PGN TimeControl header when available,
            with fallback to event-name heuristics for common TWIC events.
        minRating:
          type: integer
          minimum: 1
          description: |
            Minimum rating filter (player to move at this position).
            Aggregates use 100-point rating buckets, so precision is ±99.
        maxRating:
          type: integer
          minimum: 1
          description: |
            Maximum rating filter (player to move at this position).
            Aggregates use 100-point rating buckets, so precision is ±99.
        color:
          type: string
          enum: [white, black]
          description: Filter by the player's color at this position
        result:
          type: string
          enum: [W, B, D]
          description: Filter by game result (W, B, D)
        isOnline:
          type: boolean
          description: Filter by online vs OTB games
        orderBy:
          type: array
          description: Sorting criteria
          items:
            type: object
            required: [field, direction]
            properties:
              field: { type: string }
              direction: { type: string, enum: [asc, desc] }
    FenPositionGamesQueryRequest:
      type: object
      required:
        - fen
      properties:
        fen:
          type: string
          description: |
            FEN string representing the chess position. Four-field and six-field FEN inputs
            are accepted. The halfmove clock and fullmove number are ignored for matching.
        uci:
          type: string
          pattern: "^[a-h][1-8][a-h][1-8][qrbn]?$"
          description: Filter by next move in UCI notation (e.g. "e2e4", "e7e8q")
        playerId:
          type: string
          format: uuid
          description: Filter by player UUID (player who reached this position in the game)
        color:
          type: string
          enum: [white, black]
          description: When combined with `playerId`, restrict to games where that player had this color
        timeControl:
          type: string
          enum: [CLASSICAL, RAPID, BLITZ]
          description: Filter by time control
        result:
          type: string
          enum: [W, B, D]
          description: Filter by game result (W=White wins, B=Black wins, D=Draw)
        isOnline:
          type: boolean
          description: Filter by online vs OTB games
        minRating:
          type: integer
          minimum: 1
          description: Minimum average rating (mean of white and black Elo)
        maxRating:
          type: integer
          minimum: 1
          description: Maximum average rating (mean of white and black Elo)
        yearFrom:
          type: integer
          description: Inclusive lower bound on game year
        yearTo:
          type: integer
          description: Inclusive upper bound on game year
        sortBy:
          type: string
          description: |
            Backward-compatible single-field sort option. Equivalent to passing
            one entry in `orderBy`. Same allowed fields as `GET /api/game-position/fen/games`.
        sortDirection:
          type: string
          enum: [asc, desc]
          description: Sort direction used with `sortBy`.
        orderBy:
          type: array
          description: |
            Multi-key sort. Fields are applied in order. `sortBy` (if also provided) is appended.
            Falls back to `date DESC, id DESC` if no valid fields are given.
          items:
            type: object
            required: [field, direction]
            properties:
              field: { type: string }
              direction: { type: string, enum: [asc, desc] }
        pageNumber:
          type: integer
          minimum: 0
          default: 0
          description: Page number (0-indexed)
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
          description: Number of results per page
        notationPlies:
          type: integer
          minimum: 0
          maximum: 20
          default: 0
          description: |
            Number of plies of continuation to include per row, in UCI notation,
            starting from the queried position (exclusive of the move that reached it).
            `0` (default) disables the field. Values above 20 are clamped to 20.

    PositionGamesQueryRequest:
      type: object
      required:
        - fen
      properties:
        fen:
          type: string
          description: |
            FEN string representing the chess position.
            The halfmove clock and fullmove number (last two FEN fields) are ignored for matching.
        moves:
          type: array
          description: |
            Explored mainline moves (UCI), from the start position to the current position.
            Required for deep position queries beyond the indexed opening window.
          items:
            type: string
            pattern: "^[a-h][1-8][a-h][1-8][qrbn]?$"
          example: ["e2e4", "e7e5", "g1f3", "b8c6"]
        uci:
          type: string
          pattern: "^[a-h][1-8][a-h][1-8][qrbn]?$"
          description: Filter by next move in UCI notation (e.g. "e2e4", "e7e8q")
        playerId:
          type: string
          format: uuid
          description: Filter by player UUID (player to move at this position)
        timeControl:
          type: string
          enum: [CLASSICAL, RAPID, BLITZ]
          description: |
            Filter games by their classified time control category.
            Classification is based on the PGN TimeControl header when available,
            with fallback to event-name heuristics for common TWIC events.
        minRating:
          type: integer
          minimum: 1
          description: |
            Minimum rating filter (player to move at this position).
            Aggregates use 100-point rating buckets, so precision is ±99.
        maxRating:
          type: integer
          minimum: 1
          description: |
            Maximum rating filter (player to move at this position).
            Aggregates use 100-point rating buckets, so precision is ±99.
        color:
          type: string
          enum: [white, black]
          description: Filter by the player's color at this position
        result:
          type: string
          enum: [W, B, D]
          description: Filter by game result (W, B, D)
        isOnline:
          type: boolean
          description: Filter by online vs OTB games
        orderBy:
          type: array
          description: Sorting criteria
          items:
            type: object
            required: [field, direction]
            properties:
              field: { type: string }
              direction: { type: string, enum: [asc, desc] }
        sortBy:
          type: string
          description: |
            Backward-compatible single-field sort option. Equivalent to passing
            one entry in `orderBy`.
        sortDirection:
          type: string
          enum: [asc, desc]
          description: Sort direction used with `sortBy`.
        pageNumber:
          type: integer
          minimum: 0
          default: 0
          description: Page number (0-indexed)
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
          description: Number of results per page
        notationPlies:
          type: integer
          minimum: 0
          maximum: 20
          default: 0
          description: |
            Number of plies of continuation to include per row, in UCI notation,
            starting from the queried position (exclusive of the move that reached it).
            `0` (default) disables the field. Values above 20 are clamped to 20.
    SearchColumn:
      type: object
      required: [name, type, nullable, searchable, filterable, sortable, operators]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [string, integer, number, boolean, datetime, uuid, json]
        nullable: { type: boolean }
        searchable: { type: boolean }
        filterable: { type: boolean }
        sortable: { type: boolean }
        operators:
          type: array
          items: { type: string }
        enumValues:
          type: array
          items: { type: string }

    SearchResource:
      type: object
      required: [name, label, primaryKey, defaultSearchColumns, columns]
      properties:
        name: { type: string }
        label: { type: string }
        primaryKey: { type: string }
        defaultSearchColumns:
          type: array
          items: { type: string }
        columns:
          type: array
          items: { $ref: "#/components/schemas/SearchColumn" }

    SearchMetadataResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [resources]
          properties:
            resources:
              type: array
              items: { $ref: "#/components/schemas/SearchResource" }

    SearchResultBase:
      type: object
      required: [resource, id, score, label, snippet, preview]
      properties:
        resource: { type: string }
        id:
          type: string
          format: uuid
        score:
          type: number
        label:
          type: string
        snippet:
          type: string
        preview:
          type: object

    GameSearchPreview:
      type: object
      required: [id, date, result, timeControl]
      properties:
        id: { type: string, format: uuid }
        date: { type: string, format: date-time }
        result: { type: string, enum: [W, B, D] }
        timeControl: { type: string, enum: [CLASSICAL, RAPID, BLITZ] }
        whitePlayerId: { type: string, format: uuid, nullable: true }
        blackPlayerId: { type: string, format: uuid, nullable: true }
        eco: { type: string, nullable: true }
        opening: { type: string, nullable: true }
        variation: { type: string, nullable: true }
        event: { type: string, nullable: true }
        site: { type: string, nullable: true }
        isOnline: { type: boolean, description: "Whether the game was played online" }
        white: { type: string, nullable: true }
        black: { type: string, nullable: true }
        whiteTitle: { type: string, nullable: true }
        blackTitle: { type: string, nullable: true }
        whiteElo: { type: integer, nullable: true }
        blackElo: { type: integer, nullable: true }
        whiteFed: { type: string, nullable: true, description: "White player's country/federation" }
        blackFed: { type: string, nullable: true, description: "Black player's country/federation" }
        continuation:
          type: array
          nullable: true
          description: |
            Continuation in UCI notation starting from the queried position (exclusive of
            the move that reached it). Truncated to at most `notationPlies` entries.
            Omitted when `notationPlies` is `0` (default). Returns `[]` when the game has
            no remaining moves from this position.
          items:
            type: string
            pattern: "^[a-h][1-8][a-h][1-8][qrbn]?$"
          example: ["d2c3", "f8c5", "d1e2", "d8e7", "e1g1"]

    PlayerGamePreview:
      allOf:
        - $ref: "#/components/schemas/GameSearchPreview"
        - type: object
          required: [color, outcome]
          properties:
            color:
              type: string
              enum: [white, black]
              description: The player's color in this game
            outcome:
              type: string
              enum: [win, loss, draw]
              description: Outcome from the player's perspective

    PlayerOpeningTreeStats:
      type: object
      required: [white, black, draws, total]
      properties:
        white: { type: integer, description: Games won by White }
        black: { type: integer, description: Games won by Black }
        draws: { type: integer, description: Drawn games }
        total: { type: integer, description: Total games }

    PlayerOpeningTreeMove:
      allOf:
        - $ref: "#/components/schemas/PlayerOpeningTreeStats"
        - type: object
          required: [uci, childNodeId, filterBuckets]
          properties:
            uci:
              type: string
              pattern: "^[a-h][1-8][a-h][1-8][qrbn]?$"
            childNodeId:
              type: integer
            lastPlayed:
              type: string
              format: date-time
            sampleGameId:
              type: string
              format: uuid
            filterBuckets:
              type: object
              description: >
                Exact combined buckets keyed as
                `color=white|timeControl=BLITZ|isOnline=true|result=W|year=2025|rating=2600`.
                Frontends can sum matching buckets to apply local filters.
              additionalProperties:
                $ref: "#/components/schemas/PlayerOpeningTreeStats"

    PlayerOpeningTreeNode:
      type: object
      required: [id, fenKey, ply, moves]
      properties:
        id: { type: integer }
        fenKey:
          type: string
          description: Four-field normalized FEN key.
        ply:
          type: integer
        moves:
          type: array
          items:
            $ref: "#/components/schemas/PlayerOpeningTreeMove"

    PlayerOpeningTreeSnapshot:
      type: object
      required: [treeId, playerId, maxPly, rootNodeId, bucketDimensions, generatedAt, nodes]
      properties:
        treeId: { type: string }
        playerId:
          type: string
          format: uuid
        maxPly: { type: integer }
        rootNodeId: { type: integer }
        bucketDimensions:
          type: array
          items:
            type: string
            enum: [color, timeControl, isOnline, result, year, rating]
        generatedAt:
          type: string
          format: date-time
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PlayerOpeningTreeNode"

    PlayerOpeningTreeStatusResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [treeId, status, maxPly]
          properties:
            treeId: { type: string }
            status:
              type: string
              enum: [queued, building, ready, error]
            maxPly: { type: integer }
            expiresAt:
              type: string
              format: date-time
            error:
              type: string

    PlayerOpeningTreeSnapshotResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: "#/components/schemas/PlayerOpeningTreeSnapshot"

    PlayerGamesResponse:
      type: object
      required: [status, data, metadata]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: array
          items: { $ref: "#/components/schemas/PlayerGamePreview" }
        metadata:
          type: object
          required: [pageNumber, pageSize, hasMore]
          properties:
            pageNumber: { type: integer }
            pageSize: { type: integer }
            hasMore: { type: boolean }

    PlayerEventItem:
      allOf:
        - $ref: "#/components/schemas/EventSearchItem"
        - type: object
          required: [wins, draws, losses, score]
          properties:
            wins:
              type: integer
              description: Wins from the player's perspective in this event
            draws:
              type: integer
              description: Draws by the player in this event
            losses:
              type: integer
              description: Losses from the player's perspective in this event
            score:
              type: number
              description: Player score in this event, counting wins as 1 and draws as 0.5

    PlayerEventsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [events, metadata]
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/PlayerEventItem"
            metadata:
              type: object
              required: [pageNumber, pageSize, hasMore]
              properties:
                pageNumber:
                  type: integer
                  description: 0-indexed page number
                pageSize:
                  type: integer
                hasMore:
                  type: boolean
                totalCount:
                  type: integer
                  description: Total number of matching player events when available

    PlayerStatsOpening:
      type: object
      required: [eco, games, wins, draws, losses, winRate]
      properties:
        eco: { type: string }
        openingName: { type: string, nullable: true }
        games: { type: integer }
        wins: { type: integer }
        draws: { type: integer }
        losses: { type: integer }
        winRate:
          type: number
          description: Win rate percentage in range [0, 100]

    PlayerStatsColorSplit:
      type: object
      required: [games, wins, draws, losses]
      properties:
        games: { type: integer }
        wins: { type: integer }
        draws: { type: integer }
        losses: { type: integer }

    PlayerStatsResponse:
      type: object
      required: [status, data, metadata]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [totals, color, avgOpponentRating, openings]
          properties:
            totals:
              $ref: "#/components/schemas/PlayerStatsColorSplit"
            color:
              type: object
              required: [white, black]
              properties:
                white:
                  $ref: "#/components/schemas/PlayerStatsColorSplit"
                black:
                  $ref: "#/components/schemas/PlayerStatsColorSplit"
            avgOpponentRating:
              type: integer
            openings:
              type: object
              required: [all, white, black]
              properties:
                all:
                  type: array
                  items:
                    $ref: "#/components/schemas/PlayerStatsOpening"
                white:
                  type: array
                  items:
                    $ref: "#/components/schemas/PlayerStatsOpening"
                black:
                  type: array
                  items:
                    $ref: "#/components/schemas/PlayerStatsOpening"
        metadata:
          type: object
          required: [exact]
          properties:
            exact:
              type: boolean
              enum: [true]

    PositionGamesResponse:
      type: object
      required: [status, data, metadata]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: array
          items: { $ref: "#/components/schemas/GameSearchPreview" }
        metadata:
          type: object
          required: [pageNumber, pageSize, hasMore]
          properties:
            pageNumber: { type: integer }
            pageSize: { type: integer }
            hasMore: { type: boolean }
            totalCount:
              type: integer
              description: Total matching games when it can be returned without an expensive broad count.
            totalCountIsEstimate:
              type: boolean
              description: False when totalCount is exact; omitted when no cheap count is available.

    SearchResult:
      oneOf:
        - allOf:
            - $ref: "#/components/schemas/SearchResultBase"
            - type: object
              properties:
                resource: { type: string, enum: [player] }
                preview: { $ref: "#/components/schemas/Player" }
        - allOf:
            - $ref: "#/components/schemas/SearchResultBase"
            - type: object
              properties:
                resource: { type: string, enum: [game] }
                preview: { $ref: "#/components/schemas/GameSearchPreview" }

    GlobalSearchResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [results, metadata]
          properties:
            results:
              type: array
              items: { $ref: "#/components/schemas/SearchResult" }
            metadata:
              type: object
              required: [pageNumber, pageSize, totalCount, totalCountIsEstimate, hasMore]
              properties:
                pageNumber: { type: integer }
                pageSize: { type: integer }
                totalCount: { type: integer }
                totalCountIsEstimate:
                  type: boolean
                  description: When true, totalCount is an estimate (used to avoid expensive COUNT(*) on broad queries).
                hasMore: { type: boolean }

    EventSearchItem:
      type: object
      required:
        [id, event, gameCount, startDate, endDate, dominantTimeControl, avgElo, maxElo, ratingSummary]
      properties:
        id:
          type: string
          description: Deterministic ID derived from event name (stable hash)
        event:
          type: string
        site:
          type: string
          nullable: true
        gameCount:
          type: integer
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        dominantTimeControl:
          type: string
          nullable: true
          enum: [CLASSICAL, RAPID, BLITZ]
        avgElo:
          type: integer
          nullable: true
        maxElo:
          type: integer
          nullable: true
        ratingSummary:
          type: object
          required: [avgElo, maxElo]
          properties:
            avgElo:
              type: integer
              nullable: true
            maxElo:
              type: integer
              nullable: true

    EventSearchResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [events, metadata]
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/EventSearchItem"
            metadata:
              type: object
              required: [pageNumber, pageSize, hasMore]
              properties:
                pageNumber:
                  type: integer
                pageSize:
                  type: integer
                hasMore:
                  type: boolean

    SearchQueryRequest:
      type: object
      required: [resource]
      properties:
        resource:
          type: string
          description: Resource name (e.g. 'player', 'game')
        q:
          type: string
          description: Optional free-text search string
        where:
          type: object
          description: Filter conditions (recursive boolean logic)
        orderBy:
          type: array
          items:
            type: object
            required: [field, direction]
            properties:
              field: { type: string }
              direction: { type: string, enum: [asc, desc] }
        countMode:
          type: string
          enum: [auto, estimate, exact]
          default: auto
          description: |
            Count strategy for `metadata.totalCount`.
            - `auto`: exact for selective queries, estimated for broad ones.
            - `estimate`: always use fast estimate.
            - `exact`: always run exact COUNT(*).
        pageNumber:
          type: integer
          default: 1
        pageSize:
          type: integer
          default: 20

    SearchQueryResponse:
      type: object
      required: [status, data, metadata]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: array
          items: { type: object }
        metadata:
          type: object
          required: [pageNumber, pageSize, totalCount, totalCountIsEstimate, hasMore]
          properties:
            pageNumber: { type: integer }
            pageSize: { type: integer }
            totalCount: { type: integer }
            totalCountIsEstimate:
              type: boolean
              description: When true, totalCount is an estimate (used to avoid expensive COUNT(*) on broad queries).
            hasMore: { type: boolean }

    MoveAggregate:
      type: object
      required:
        - uci
        - white
        - black
        - draws
        - total
      properties:
        uci:
          type: string
          description: Move in UCI notation (e.g., "e2e4")
        white:
          type: integer
          description: Number of games won by white after this move
        black:
          type: integer
          description: Number of games won by black after this move
        draws:
          type: integer
          description: Number of games drawn after this move
        total:
          type: integer
          description: Total number of games with this move
        gameId:
          type: string
          format: uuid
          description: Game ID (only present when total = 1)
        lastPlayed:
          type: string
          format: date-time
          nullable: true
          description: Most recent game date for this move

    Player:
      type: object
      required:
        - id
        - fideId
        - name
        - gender
        - fed
      properties:
        id:
          type: string
          format: uuid
          description: Internal player UUID
        fideId:
          type: string
          description: FIDE player ID
        name:
          type: string
          description: Player name
        gender:
          type: string
          enum:
            - MALE
            - FEMALE
          description: Player gender
        fed:
          type: string
          description: Country name as shown on FIDE profile (e.g., "Norway", "United States of America")
        title:
          type: string
          nullable: true
          description: Chess title (e.g., "GM", "IM", "FM")
        ratingClassical:
          type: integer
          description: Classical rating
        ratingRapid:
          type: integer
          description: Rapid rating
        ratingBlitz:
          type: integer
          description: Blitz rating
        updatedAt:
          type: string
          format: date-time
          description: Last updated timestamp
        createdAt:
          type: string
          format: date-time
          description: Created timestamp

    Game:
      type: object
      required:
        - id
        - date
        - result
        - timeControl
      properties:
        id:
          type: string
          format: uuid
          description: Game UUID
        data:
          type: object
          description: Full game data including moves and metadata
        eco:
          type: string
          nullable: true
          description: ECO code extracted from PGN headers
        opening:
          type: string
          nullable: true
          description: Opening name extracted from PGN headers
        variation:
          type: string
          nullable: true
          description: Variation extracted from PGN headers
        event:
          type: string
          nullable: true
          description: Event extracted from PGN headers
        site:
          type: string
          nullable: true
          description: Site extracted from PGN headers
        isOnline:
          type: boolean
          description: Whether the game was played online
        whiteName:
          type: string
          nullable: true
          description: White player name extracted from PGN headers
        blackName:
          type: string
          nullable: true
          description: Black player name extracted from PGN headers
        whiteFideId:
          type: string
          nullable: true
          description: White player FIDE ID extracted from PGN headers
        blackFideId:
          type: string
          nullable: true
          description: Black player FIDE ID extracted from PGN headers
        whiteElo:
          type: integer
          nullable: true
          description: White Elo extracted from PGN headers (if present)
        blackElo:
          type: integer
          nullable: true
          description: Black Elo extracted from PGN headers (if present)
        whiteFed:
          type: string
          nullable: true
          description: White player's federation/country (e.g., "Norway", "Turkiye")
        blackFed:
          type: string
          nullable: true
          description: Black player's federation/country (e.g., "Russia", "United States of America")
        whitePlayerId:
          type: string
          format: uuid
          nullable: true
          description: White player UUID
        blackPlayerId:
          type: string
          format: uuid
          nullable: true
          description: Black player UUID
        date:
          type: string
          format: date-time
          description: Date the game was played
        timeControl:
          type: string
          enum:
            - CLASSICAL
            - RAPID
            - BLITZ
          description: Time control category
        result:
          type: string
          enum:
            - W
            - B
            - D
          description: Game result (W=White wins, B=Black wins, D=Draw)
        gamebaseStatus:
          type: string
          enum: [TODO, QUEUED, PROCESSING, COMPLETED, FAILED]
          description: Ingestion/processing status
        gamebaseError:
          type: string
          nullable: true
          description: Error message when status is FAILED
        updatedAt:
          type: string
          format: date-time
          description: Last updated timestamp
        createdAt:
          type: string
          format: date-time
          description: Created timestamp

    GameWithPgn:
      allOf:
        - $ref: "#/components/schemas/Game"
        - type: object
          required: [pgn]
          properties:
            pgn:
              type: string
              nullable: true
              description: Raw PGN text, if available

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: object
          properties:
            message:
              type: string
              description: Error message
      example:
        status: error
        error:
          message: "Missing API Key"

    PositionEval:
      type: object
      required: [fen, source, depth, knodes, pvs]
      properties:
        fen:
          type: string
          description: Normalized FEN position (4 fields)
        source:
          type: string
          description: Data source name (e.g., "lichess_db_eval")
        depth:
          type: integer
          description: Search depth of the evaluation
        knodes:
          type: integer
          description: Number of nodes searched (in thousands)
        pvs:
          type: array
          items:
            type: object
            required: [moves, whitePerspective]
            properties:
              cp:
                type: integer
                nullable: true
                description: Centipawn evaluation (relative to white)
              mate:
                type: integer
                nullable: true
                description: Moves to mate (positive for white, negative for black)
              moves:
                type: array
                items:
                  type: string
                description: Recommended mainline moves in UCI notation
              whitePerspective:
                type: boolean
                description: Indicates the evaluation is from white's perspective
